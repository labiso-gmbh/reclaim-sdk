name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: flake8 reclaim_sdk
      - run: pytest tests/unit --cov=reclaim_sdk --cov-report=term-missing --cov-fail-under=90
